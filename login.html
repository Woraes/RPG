<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Misterio - Login</title>
  <link rel="stylesheet" href="multipage.css?v=20260519a">
</head>
<body class="screen-auth">
  <main class="auth-wrap">
    <section class="auth-card">
      <p class="eyebrow">Investigacao Paranormal</p>
      <h1 class="brand">Mansao Misterio</h1>
      <p class="subtitle">Entre com seu nome para iniciar a investigacao.</p>

      <form id="login-form" class="auth-form">
        <label for="player-name">Nome do investigador</label>
        <input id="player-name" name="playerName" maxlength="24" placeholder="Ex: Agente Sofia" required>
        <button type="submit">Entrar na Mansao</button>
      </form>
    </section>
  </main>

  <script src="app-pages.js"></script>
</body>
</html>
