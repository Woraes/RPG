<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Misterio - Mapa</title>
  <link rel="stylesheet" href="multipage.css">
</head>
<body class="screen-map">
  <header class="map-topbar">
    <div>
      <p class="eyebrow">Mapa da Mansao</p>
      <h1>Misterio</h1>
      <p id="welcome" class="muted"></p>
    </div>
    <div class="top-actions">
      <button id="logout-btn" class="btn-ghost">Trocar jogador</button>
    </div>
  </header>

  <main class="room-grid">
    <a class="room-card" href="hall.html">
      <img src="assets/images/hall_principal.png" alt="Hall Principal">
      <span>Hall Principal</span>
    </a>
    <a class="room-card" href="biblioteca.html">
      <img src="assets/images/biblioteca.png" alt="Biblioteca">
      <span>Biblioteca</span>
    </a>
    <a class="room-card" href="laboratorio.html">
      <img src="assets/images/laboratorio.png" alt="Laboratorio">
      <span>Laboratorio</span>
    </a>
    <a class="room-card" href="jardim.html">
      <img src="assets/images/jardim_abandonado.png" alt="Jardim Abandonado">
      <span>Jardim Abandonado</span>
    </a>
    <a class="room-card" href="sala-retratos.html">
      <img src="assets/images/sala_retratos.png" alt="Sala de Retratos">
      <span>Sala de Retratos</span>
    </a>
    <a class="room-card" href="sotao.html">
      <img src="assets/images/sotao_misterioso.png" alt="Sotao Misterioso">
      <span>Sotao Misterioso</span>
    </a>
  </main>

  <script src="app-pages.js"></script>
</body>
</html>
